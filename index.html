<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>股票行情看板</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>
  <!-- 视图切换按钮 - 固定在右上角 -->
  <button id="viewSwitchBtn" class="view-switch-btn" title="切换视图">历史K线</button>
  <div class="sidebar">
    <div class="search-box">
      <input id="searchInput" type="text" placeholder="输入代码/拼音/中文" autocomplete="off">
      <button id="clearBtn" class="clear-btn">✕</button>
      <button id="themeToggle" class="theme-btn" title="切换深浅色">🌙</button>
    </div>
    <div class="search-hint">💡 代码/拼音首字母/全拼/中文</div>
    <div class="stock-table-wrap">
      <table class="stock-table">
        <thead>
          <tr>
            <th>代码</th>
            <th>名称</th>
            <th style="text-align:right">最新价</th>
            <th style="text-align:right">涨跌幅</th>
          </tr>
        </thead>
        <tbody id="stockTbody"></tbody>
      </table>
    </div>
  </div>
  <div class="main">
    <div class="chart-header">
      <h2 id="chartTitle">请选择股票</h2>
      <span class="price-info" id="priceInfo"></span>
      <div class="indicator-btns" id="indicatorBtns">
        <select class="ind-select" id="indicatorSelect">
          <option value="ma" selected>均线</option>
          <option value="macd">MACD</option>
          <option value="kdj">KDJ</option>
          <option value="rsi">RSI</option>
          <option value="cci">CCI</option>
          <option value="obv">OBV</option>
          <option value="vwap">VWAP</option>
          <option value="atr">ATR</option>
        </select>
        <div class="period-toggle" id="periodToggle" style="display:none;">
          <button class="period-btn active" data-period="day">日线</button>
          <button class="period-btn" data-period="week">周线</button>
          <button class="period-btn" data-period="month">月线</button>
        </div>
        <button class="ma-set-btn" id="maSettingsBtn" title="设置均线周期">⚙️</button>
        <button class="analysis-btn" id="analysisBtn" title="生成个股AI分析报告">🤖 AI分析</button>
      </div>
    </div>
    <div id="realtimeView" class="main-content">
      <div class="realtime-left">
        <div class="sub-chart-container" id="timeChartContainer">
          <div class="loading">加载分时数据...</div>
        </div>
        <div class="sub-chart-container" id="volumeChartContainer">
          <div class="loading">加载成交量...</div>
        </div>
      </div>
      <div class="realtime-right">
        <div class="stock-info-card">
          <div class="info-row">
            <span class="label">开盘价</span>
            <span class="value" id="infoOpen">--</span>
          </div>
          <div class="info-row">
            <span class="label">昨收</span>
            <span class="value" id="infoPrevClose">--</span>
          </div>
          <div class="info-row">
            <span class="label">现价</span>
            <span class="value price-value" id="infoPrice">--</span>
          </div>
          <div class="info-row">
            <span class="label">最高</span>
            <span class="value" id="infoHigh">--</span>
          </div>
          <div class="info-row">
            <span class="label">最低</span>
            <span class="value" id="infoLow">--</span>
          </div>
          <div class="info-row">
            <span class="label">买一</span>
            <span class="value" id="infoBuy1">--</span>
          </div>
          <div class="info-row">
            <span class="label">卖一</span>
            <span class="value" id="infoSell1">--</span>
          </div>
        </div>
        <div class="order-book">
          <div class="order-book-header">盘口数据</div>
          <div class="sell-orders">
            <div class="order-row" id="sell5">
              <span class="order-price">-</span>
              <span class="order-vol">-</span>
            </div>
            <div class="order-row" id="sell4">
              <span class="order-price">-</span>
              <span class="order-vol">-</span>
            </div>
            <div class="order-row" id="sell3">
              <span class="order-price">-</span>
              <span class="order-vol">-</span>
            </div>
            <div class="order-row" id="sell2">
              <span class="order-price">-</span>
              <span class="order-vol">-</span>
            </div>
            <div class="order-row active" id="sell1">
              <span class="order-price">-</span>
              <span class="order-vol">-</span>
            </div>
          </div>
          <div class="buy-orders">
            <div class="order-row active" id="buy1">
              <span class="order-price">-</span>
              <span class="order-vol">-</span>
            </div>
            <div class="order-row" id="buy2">
              <span class="order-price">-</span>
              <span class="order-vol">-</span>
            </div>
            <div class="order-row" id="buy3">
              <span class="order-price">-</span>
              <span class="order-vol">-</span>
            </div>
            <div class="order-row" id="buy4">
              <span class="order-price">-</span>
              <span class="order-vol">-</span>
            </div>
            <div class="order-row" id="buy5">
              <span class="order-price">-</span>
              <span class="order-vol">-</span>
            </div>
          </div>
        </div>
        <div class="minute-deals">
          <div class="deals-header">分时成交</div>
          <div class="deals-list" id="dealsList">
            <div class="deal-row header">
              <span>时间</span>
              <span>价格</span>
              <span>成交量</span>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div id="klineView" class="main-content" style="display:none;">
      <div class="chart-container" id="chartContainer">
        <div class="loading">选择股票查看K线</div>
      </div>
    </div>
  </div>

  <div id="maModalOverlay" class="modal-overlay" style="display:none;">
    <div class="modal">
      <h3>设置均线周期</h3>
      <label>请输入周期，用英文逗号隔开（例如：5,10,20,60）</label>
      <input type="text" id="maPeriodsInput" value="5,10,15,30">
      <div class="modal-actions">
        <button id="maModalCancel">取消</button>
        <button id="maModalOk">确定</button>
      </div>
    </div>
  </div>

  <!-- AI 分析报告面板 -->
  <div id="analysisOverlay" class="analysis-overlay" style="display:none;">
    <div class="analysis-panel">
      <div class="analysis-panel-header">
        <h3>🤖 个股 AI 深度分析报告</h3>
        <span id="aiStatusBadge" style="font-size:12px;opacity:0.85;font-weight:400;"></span>
        <button class="analysis-close-btn" id="analysisCloseBtn">×</button>
      </div>
      <div class="analysis-panel-body" id="analysisPanelBody">
        <div class="analysis-loading">
          <div class="analysis-spinner"></div>
          <span>正在获取数据并生成分析报告，请稍候…</span>
        </div>
      </div>
      <div class="analysis-panel-footer">
        <button class="analysis-refresh-btn" id="analysisRefreshBtn">🔄 重新生成</button>
      </div>
    </div>
  </div>

  <script src="js/modules/state.js"></script>
  <script src="js/modules/search.js"></script>
  <script src="js/modules/stockList.js"></script>
  <script src="js/modules/indicators.js"></script>
  <script src="js/modules/klineChart.js"></script>
  <script src="js/modules/realtimeChart.js"></script>
  <script src="js/modules/analysis.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
